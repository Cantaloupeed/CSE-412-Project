<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dining Hall Menu</title>

<style>
  :root {
    --maroon: #8C1D40;
    --gold: #FFC627;
    --light-bg: #fff8e7;
    --text-dark: #333;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: var(--light-bg);
    color: var(--text-dark);
  }

  header {
    background-color: var(--maroon);
    color: white;
    padding: 20px;
    text-align: center;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }

  select {
    padding: 10px;
    font-size: 16px;
    border: 2px solid var(--maroon);
    border-radius: 5px;
  }

  .meal-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .meal-tabs button,
  .admin-panel button,
  .card-actions button {
    padding: 10px 20px;
    border: none;
    background-color: var(--maroon);
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
    margin-top: 8px;
  }

  .meal-tabs button:hover,
  .admin-panel button:hover,
  .card-actions button:hover {
    background-color: #6a1630;
  }

  .active-tab {
    background-color: var(--gold) !important;
    color: black !important;
  }

  #menuContainer,
  .admin-panel {
    max-width: 800px;
    margin: auto;
    padding: 20px;
  }

  .menu-card,
  .admin-panel {
    background: white;
    border-left: 6px solid var(--gold);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .menu-card h3,
  .admin-panel h2 {
    margin-top: 0;
    color: var(--maroon);
  }

  .menu-card p {
    margin: 5px 0 0;
  }

  .menu-details {
    margin-top: 10px;
    padding: 10px;
    background-color: #fff3c4;
    border-radius: 6px;
  }

  .admin-panel input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 12px;
    padding: 10px;
    border: 2px solid var(--maroon);
    border-radius: 6px;
  }

  .card-actions {
    margin-top: 12px;
  }
</style>
</head>

<body>

<header>
  <h1>Dining Hall Menus</h1>
</header>

<div class="controls">
  <select id="diningHallSelect">
    <option value="Barrett">Barrett</option>
    <option value="Hassayampa">Hassayampa</option>
    <option value="Tooker">Tooker</option>
    <option value="Manzanita">Manzanita</option>
    <option value="HIDA">HIDA</option>
    <option value="Pitchforks">Pitchforks</option>
  </select>
</div>

<div class="meal-tabs">
  <button onclick="setMeal('Breakfast')" id="BreakfastBtn">Breakfast</button>
  <button onclick="setMeal('Lunch')" id="LunchBtn">Lunch</button>
  <button onclick="setMeal('Dinner')" id="DinnerBtn">Dinner</button>
</div>

<section id="menuContainer"></section>

<section class="admin-panel">
  <h2>Manage Menu Items</h2>

  <input type="hidden" id="editId">

  <input id="itemName" placeholder="Item name">
  <input id="itemIngredients" placeholder="Ingredients">
  <input id="itemCalories" type="number" placeholder="Calories" min="0">
  <input id="itemProtein" type="number" placeholder="Protein in grams" min="0">

  <button onclick="saveItem()">Save Item</button>
  <button onclick="clearForm()">Cancel</button>
</section>

<script>
  let selectedMeal = "Breakfast";

  async function renderMenu() {
    const hall = document.getElementById("diningHallSelect").value;
    const menuContainer = document.getElementById("menuContainer");

    try {
      const response = await fetch(`/menu?hall=${hall}&meal=${selectedMeal}`);
      const items = await response.json();

      document.querySelectorAll(".meal-tabs button").forEach(btn => {
        btn.classList.remove("active-tab");
      });

      document.getElementById(selectedMeal + "Btn").classList.add("active-tab");

      if (items.length === 0) {
        menuContainer.innerHTML = `<h2>No items available</h2>`;
        return;
      }

      menuContainer.innerHTML = `<h2>${selectedMeal} Menu</h2>`;

      items.forEach(item => {
        menuContainer.innerHTML += `
          <div class="menu-card">
            <h3>${item.name.replace(/_/g, ' ')}</h3>

            <div class="menu-details">
              <p><strong>Ingredients:</strong> ${item.ingredients.replace(/_/g, ' ')}</p>
              <p><strong>Calories:</strong> ${item.calories}</p>
              <p><strong>Protein:</strong> ${item.protein}g</p>
            </div>

            <div class="card-actions">
              <button onclick='editItem(${JSON.stringify(item)})'>Edit</button>
              <button onclick="deleteItem('${item.id}')">Delete</button>
            </div>
          </div>
        `;
      });

    } catch (err) {
      console.error(err);
      menuContainer.innerHTML = `<h2>Could not load menu items.</h2>`;
    }
  }

  function setMeal(meal) {
    selectedMeal = meal;
    renderMenu();
  }

  async function saveItem() {
    const calories = Number(document.getElementById("itemCalories").value);
    const protein = Number(document.getElementById("itemProtein").value);

    if (calories < 0 || protein < 0) {
      alert("Calories and protein cannot be negative.");
      return;
    }
    const hall = document.getElementById("diningHallSelect").value;
    const id = document.getElementById("editId").value;

    const item = {
      hall: hall,
      meal: selectedMeal,
      name: document.getElementById("itemName").value.replace(/\s/g, "_"),
      ingredients: document.getElementById("itemIngredients").value.replace(/\s/g, "_"),
      calories: document.getElementById("itemCalories").value,
      protein: document.getElementById("itemProtein").value
    };

    if (!item.name || !item.ingredients || !item.calories || !item.protein) {
      alert("Please fill out all fields.");
      return;
    }

    if (id) {
      await fetch(`/menu/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(item)
      });
    } else {
      await fetch("/menu", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(item)
      });
    }

    clearForm();
    renderMenu();
  }

  function editItem(item) {
    document.getElementById("editId").value = item.id;
    document.getElementById("itemName").value = item.name.replace(/_/g, " ");
    document.getElementById("itemIngredients").value = item.ingredients.replace(/_/g, " ");
    document.getElementById("itemCalories").value = item.calories;
    document.getElementById("itemProtein").value = item.protein;
  }

  async function deleteItem(id) {
    await fetch(`/menu/${id}`, {
      method: "DELETE"
    });

    clearForm();
    renderMenu();
  }

  function clearForm() {
    document.getElementById("editId").value = "";
    document.getElementById("itemName").value = "";
    document.getElementById("itemIngredients").value = "";
    document.getElementById("itemCalories").value = "";
    document.getElementById("itemProtein").value = "";
  }

  document.getElementById("diningHallSelect").addEventListener("change", renderMenu);

  renderMenu();
</script>

</body>
</html>
